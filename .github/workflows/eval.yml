name: eval

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'points/**'
      - 'ui/agents.js'
      - 'extension/lib/**'
      - 'eval/**'
      - '.github/workflows/eval.yml'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'points/**'
      - 'ui/agents.js'
      - 'extension/lib/**'
      - 'eval/**'
      - '.github/workflows/eval.yml'
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run inline-critic regression eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL: claude-sonnet-4-6
        run: node eval/run.mjs
