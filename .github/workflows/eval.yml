name: eval

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'points/**'
      - 'bundles.json'
      - 'tools/**'
      - 'ui/agents.js'
      - 'ui/skill-loader.js'
      - 'side-panel-coach/lib/**'
      - 'side-panel-coach/rules/**'
      - 'eval/**'
      - '.github/workflows/eval.yml'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'points/**'
      - 'bundles.json'
      - 'tools/**'
      - 'ui/agents.js'
      - 'ui/skill-loader.js'
      - 'side-panel-coach/lib/**'
      - 'side-panel-coach/rules/**'
      - 'eval/**'
      - '.github/workflows/eval.yml'
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Free, deterministic gate: the extension's bundled rule snapshot must
      # match bundles.json + points/ + skills/. Runs before the paid eval so
      # drift fails fast without burning API budget.
      - name: Check rule snapshot is in sync
        run: node tools/sync-rules.mjs --check

      - name: Run inline-critic regression eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL: claude-sonnet-4-6
        run: node eval/run.mjs
